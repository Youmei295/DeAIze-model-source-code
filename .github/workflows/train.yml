name: Train Model on Kaggle

on:
  push:
    branches:
      - main

jobs:
  deploy-to-kaggle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Kaggle API
        run: pip install kaggle --upgrade --pre

      - name: Trigger Kaggle Notebook
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          # Ensure the config directory exists
          mkdir -p ~/.kaggle
          
          # Create kaggle.json
          echo "{\"username\":\"${KAGGLE_USERNAME}\",\"key\":\"${KAGGLE_KEY}\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          
          # Replace 'main' with the actual commit SHA to bypass cache
          sed -i "s/main\/dataset.json/${{ github.sha }}\/dataset.json/g" train.ipynb
          
          # Verify Kaggle CLI version and help (for debugging)
          kaggle kernels push -h
          
          # Push the kernel to Kaggle requesting the T4 x2 accelerator
          kaggle kernels push -p . --accelerator T4x2
          
          echo "Waiting for Kaggle kernel to queue..."
          sleep 30
          
          # Poll the status of the Kaggle kernel
          while true; do
            STATUS=$(kaggle kernels status youmei1/deaize-training-infrastructure)
            echo "$STATUS"
            if [[ "$STATUS" == *"complete"* ]]; then
              echo "Kernel finished successfully."
              exit 0
            elif [[ "$STATUS" == *"error"* || "$STATUS" == *"ERROR"* || "$STATUS" == *"cancel"* || "$STATUS" == *"fatal"* ]]; then
              echo "Kernel failed or was cancelled!"
              exit 1
            fi
            sleep 60
          done